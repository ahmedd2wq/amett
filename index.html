<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Çok Seviyorum ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            max-width: 350px;
            width: 90%;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d63384;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            height: 50px;
            position: relative;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
        }

        #noBtn {
            background-color: #6c757d;
            color: white;
            position: absolute;
        }

        /* Arka plan kalpleri */
        .bg-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.4);
            font-size: 20px;
            user-select: none;
            z-index: 1;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <div id="imageArea" style="font-size: 60px;">🥺</div>
        <h1>Özür Dilerim...</h1>
        <p>Kalbinin kırılmasına sebep olduğum için çok üzgünüm. Beni affedip bir şans daha verir misin?</p>
        
        <div class="btn-container">
            <button id="yesBtn" class="btn" onclick="celebrate()">Evet</button>
            <button id="noBtn" class="btn" onmouseover="moveNoButton()">Hayır</button>
        </div>
    </div>

    <script>
        // Arka plan kalpleri oluşturma
        function createBgHeart() {
            const heart = document.createElement('div');
            heart.classList.add('bg-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }
        setInterval(createBgHeart, 400);

        // Kaçan buton fonksiyonu
        function moveNoButton() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.style.position = 'fixed';
        }

        // Başarı ekranı
        function celebrate() {
            const card = document.getElementById('mainCard');
            card.innerHTML = `
                <div style="font-size: 60px;">💖</div>
                <h1>Seni Çok Seviyorum!</h1>
                <p>Dünyanın en mutlu insanı olacağız, söz veriyorum. Teşekkür ederim! 🥰</p>
                <div style="color: #ff4d6d; font-size: 40px; margin-top: 10px;">✨🌸✨</div>
            `;
            // Daha yoğun kalp yağmuru
            setInterval(createBgHeart, 100);
        }
    </script>
</body>
</html>
