<script>
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    let yesSize = 18; // Başlangıç font boyutu

    // Hem mouse hem de dokunmatik ekranlar için kaçma fonksiyonu
    function moveNoButton() {
        const x = Math.random() * (window.innerWidth - noBtn.clientWidth);
        const y = Math.random() * (window.innerHeight - noBtn.clientHeight);
        
        noBtn.style.position = 'fixed';
        noBtn.style.left = x + 'px';
        noBtn.style.top = y + 'px';

        // Her kaçışta Evet butonunu büyüt (Psikolojik baskı :) )
        yesSize += 5;
        yesBtn.style.fontSize = yesSize + 'px';
        yesBtn.style.padding = (yesSize * 0.7) + 'px ' + (yesSize * 1.5) + 'px';
    }

    // Bilgisayar için (Fare üzerine gelince)
    noBtn.addEventListener('mouseover', moveNoButton);

    // Telefon için (Dokunduğu an)
    noBtn.addEventListener('touchstart', function(e) {
        e.preventDefault(); // Tıklanmasını engelle
        moveNoButton();
    });

    function celebrate() {
        const card = document.getElementById('mainCard');
        card.innerHTML = `

            <h1>asigim sana</h1>
            <p>bu siteyi yapmka cohg manntikli geldi beni affeder la diye dusunndum affet beni cok seviyom seni askim</p>
            <div style="color: #ff4d6d; font-size: 40px; margin-top: 10px;">✨🌸✨</div>
        `;
        setInterval(createBgHeart, 100);
    }
</script>
